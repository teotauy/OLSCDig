<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resend Welcome Email - OLSC Brooklyn</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #c8102e 0%, #00a65a 100%);
            background-image: url("{{ url_for('static', filename='background.png') }}"), linear-gradient(135deg, #c8102e 0%, #00a65a 100%);
            background-size: cover, auto;
            background-position: center, 0 0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 { color: #c8102e; font-size: 24px; margin-bottom: 10px; }
        .header p { color: #666; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #333; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #c8102e; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c8102e 0%, #d81d42 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(200,16,46,0.3);
            margin-top: 10px;
        }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(200,16,46,0.4);
        }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .status-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .status-message.show { display: block; }
        .status-message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .status-message.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .links { text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e0e0e0; }
        .links a { color: #c8102e; text-decoration: none; font-size: 14px; margin: 0 10px; }
        .links a:hover { text-decoration: underline; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <p style="font-size: 12px; color: #c8102e; margin-bottom: 4px;">OLSC Brooklyn</p>
            <h1>📧 Resend Welcome Email</h1>
            <p>Send the membership pass link again to a member by email</p>
        </div>

        <div class="status-message" id="statusMessage"></div>

        <form id="resendForm">
            <div class="form-group">
                <label for="email">Member email address *</label>
                <input type="email" id="email" name="email" required placeholder="member@example.com">
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Resend Welcome Email</button>
        </form>

        <div class="links">
            <a href="/admin">← Admin Panel</a>
            <a href="/add-member">+ Add Member</a>
            <a href="/update-match">⚽ Update Match</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('resendForm');
        const statusEl = document.getElementById('statusMessage');
        const submitBtn = document.getElementById('submitBtn');

        function showStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = 'status-message ' + type + ' show';
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!email) return;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Sending…';
            showStatus('', 'info');
            try {
                const res = await fetch('/api/resend-welcome-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    showStatus(data.message || 'Welcome email sent.', 'success');
                } else {
                    showStatus(data.error || 'Something went wrong.', 'error');
                }
            } catch (err) {
                showStatus('Connection error. Try again.', 'error');
            }
            submitBtn.disabled = false;
            submitBtn.textContent = 'Resend Welcome Email';
        });
    </script>
</body>
</html>
